<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0A1628"/>
  <rect width="800" height="600" fill="url(#grad1)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <!-- Clipboard -->
  <rect x="280" y="80" width="240" height="340" rx="16" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
  <rect x="340" y="60" width="120" height="40" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
  <circle cx="400" cy="80" r="8" fill="#3B82F6"/>
  <!-- Checklist items -->
  <rect x="310" y="130" width="20" height="20" rx="4" stroke="#3B82F6" stroke-width="2"/>
  <path d="M315 140 L318 144 L326 135" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="345" y="136" width="140" height="8" rx="4" fill="#3B82F6" opacity="0.4"/>
  <rect x="310" y="170" width="20" height="20" rx="4" stroke="#3B82F6" stroke-width="2"/>
  <path d="M315 180 L318 184 L326 175" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="345" y="176" width="120" height="8" rx="4" fill="#3B82F6" opacity="0.4"/>
  <rect x="310" y="210" width="20" height="20" rx="4" stroke="#3B82F6" stroke-width="2"/>
  <path d="M315 220 L318 224 L326 215" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="345" y="216" width="150" height="8" rx="4" fill="#3B82F6" opacity="0.4"/>
  <rect x="310" y="250" width="20" height="20" rx="4" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
  <rect x="345" y="256" width="100" height="8" rx="4" fill="#60A5FA" opacity="0.2"/>
  <rect x="310" y="290" width="20" height="20" rx="4" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
  <rect x="345" y="296" width="130" height="8" rx="4" fill="#60A5FA" opacity="0.2"/>
  <!-- Satellite dish icon -->
  <g transform="translate(560, 140)">
    <ellipse cx="60" cy="60" rx="55" ry="30" stroke="#3B82F6" stroke-width="2" fill="none" transform="rotate(-30 60 60)"/>
    <circle cx="60" cy="60" r="8" fill="#3B82F6"/>
    <line x1="60" y1="60" x2="100" y2="120" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
    <!-- Signal waves -->
    <path d="M30 30 Q20 20 30 10" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M20 35 Q5 20 20 5" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  <!-- Property outline -->
  <g transform="translate(100, 380)">
    <path d="M0 120 L0 60 L60 20 L120 60 L120 120 Z" stroke="#3B82F6" stroke-width="2" fill="#1E3A5F" opacity="0.6"/>
    <rect x="45" y="80" width="30" height="40" fill="#0A1628" stroke="#3B82F6" stroke-width="1"/>
    <!-- Arrow showing assessment -->
    <path d="M140 70 L180 70" stroke="#60A5FA" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
    <polygon points="180,65 190,70 180,75" fill="#60A5FA" opacity="0.5"/>
  </g>
  <!-- Wi-Fi signal -->
  <g transform="translate(550, 350)">
    <circle cx="40" cy="50" r="6" fill="#3B82F6"/>
    <path d="M20 35 Q40 15 60 35" stroke="#3B82F6" stroke-width="2.5" fill="none"/>
    <path d="M10 25 Q40 -5 70 25" stroke="#3B82F6" stroke-width="2.5" fill="none" opacity="0.6"/>
    <path d="M0 15 Q40 -20 80 15" stroke="#3B82F6" stroke-width="2.5" fill="none" opacity="0.3"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="680" cy="500" r="3" fill="#3B82F6" opacity="0.3"/>
  <circle cx="700" cy="520" r="2" fill="#3B82F6" opacity="0.2"/>
  <circle cx="720" cy="490" r="2" fill="#3B82F6" opacity="0.2"/>
</svg>
