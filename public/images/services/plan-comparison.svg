<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0A1628"/>
  <rect width="800" height="600" fill="url(#grad4)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad4" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <!-- Plan Card 1 - Standard -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="190" height="280" rx="12" fill="#1E3A5F" stroke="#374151" stroke-width="2"/>
    <rect x="0" y="0" width="190" height="60" rx="12" fill="#1E3A5F"/>
    <rect x="0" y="40" width="190" height="20" fill="#1E3A5F"/>
    <text x="95" y="38" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#9CA3AF" text-anchor="middle">Standard</text>
    <line x1="20" y1="65" x2="170" y2="65" stroke="#374151" stroke-width="1"/>
    <!-- Speed bar -->
    <text x="30" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">Speed</text>
    <rect x="30" y="105" width="130" height="8" rx="4" fill="#111827"/>
    <rect x="30" y="105" width="60" height="8" rx="4" fill="#60A5FA" opacity="0.5"/>
    <text x="30" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#60A5FA" opacity="0.7">50-200 Mbps</text>
    <!-- Data bar -->
    <text x="30" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">Priority Data</text>
    <rect x="30" y="165" width="130" height="8" rx="4" fill="#111827"/>
    <rect x="30" y="165" width="40" height="8" rx="4" fill="#60A5FA" opacity="0.5"/>
    <!-- Price -->
    <text x="95" y="225" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#9CA3AF" text-anchor="middle">$120</text>
    <text x="95" y="248" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">/month</text>
  </g>
  <!-- Plan Card 2 - Priority (highlighted) -->
  <g transform="translate(305, 80)">
    <rect x="0" y="0" width="190" height="320" rx="12" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2.5"/>
    <!-- Recommended badge -->
    <rect x="45" y="-14" width="100" height="28" rx="14" fill="#3B82F6"/>
    <text x="95" y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">POPULAR</text>
    <text x="95" y="52" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Priority</text>
    <line x1="20" y1="70" x2="170" y2="70" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
    <!-- Speed bar -->
    <text x="30" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#BFDBFE">Speed</text>
    <rect x="30" y="110" width="130" height="8" rx="4" fill="#111827"/>
    <rect x="30" y="110" width="100" height="8" rx="4" fill="#3B82F6"/>
    <text x="30" y="135" font-family="system-ui, sans-serif" font-size="10" fill="#3B82F6">200-400+ Mbps</text>
    <!-- Data bar -->
    <text x="30" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#BFDBFE">Priority Data</text>
    <rect x="30" y="170" width="130" height="8" rx="4" fill="#111827"/>
    <rect x="30" y="170" width="90" height="8" rx="4" fill="#3B82F6"/>
    <!-- Features -->
    <g transform="translate(30, 200)">
      <circle cx="6" cy="6" r="6" fill="#3B82F6" opacity="0.2"/>
      <path d="M3 6 L5 8 L9 4" stroke="#3B82F6" stroke-width="1.5" fill="none"/>
      <text x="18" y="10" font-family="system-ui, sans-serif" font-size="10" fill="#BFDBFE">Priority network access</text>
    </g>
    <!-- Price -->
    <text x="95" y="260" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">$250</text>
    <text x="95" y="283" font-family="system-ui, sans-serif" font-size="12" fill="#93C5FD" text-anchor="middle">/month</text>
  </g>
  <!-- Plan Card 3 - Business -->
  <g transform="translate(530, 100)">
    <rect x="0" y="0" width="190" height="280" rx="12" fill="#1E3A5F" stroke="#374151" stroke-width="2"/>
    <text x="95" y="38" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#9CA3AF" text-anchor="middle">Business</text>
    <line x1="20" y1="65" x2="170" y2="65" stroke="#374151" stroke-width="1"/>
    <!-- Speed bar -->
    <text x="30" y="95" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">Speed</text>
    <rect x="30" y="105" width="130" height="8" rx="4" fill="#111827"/>
    <rect x="30" y="105" width="120" height="8" rx="4" fill="#60A5FA" opacity="0.5"/>
    <text x="30" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#60A5FA" opacity="0.7">150-500+ Mbps</text>
    <!-- Data bar -->
    <text x="30" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#9CA3AF">Priority Data</text>
    <rect x="30" y="165" width="130" height="8" rx="4" fill="#111827"/>
    <rect x="30" y="165" width="120" height="8" rx="4" fill="#60A5FA" opacity="0.5"/>
    <!-- Price -->
    <text x="95" y="225" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#9CA3AF" text-anchor="middle">$500</text>
    <text x="95" y="248" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">/month</text>
  </g>
  <!-- Arrow pointing to recommended -->
  <g transform="translate(350, 430)">
    <text x="50" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle">We help you choose</text>
    <text x="50" y="38" font-family="system-ui, sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle">the right plan</text>
  </g>
</svg>
