<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0A1628"/>
  <rect width="800" height="600" fill="url(#grad2)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad2" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <!-- Road -->
  <rect x="0" y="420" width="800" height="180" fill="#111827"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#374151" stroke-width="2" stroke-dasharray="30 20"/>
  <!-- RV Body -->
  <g transform="translate(150, 240)">
    <rect x="0" y="40" width="400" height="140" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
    <!-- Cab -->
    <path d="M400 40 L400 180 L480 180 L480 80 L440 40 Z" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
    <!-- Windshield -->
    <path d="M440 50 L480 85 L480 120 L410 120 L410 50 Z" fill="#0A1628" stroke="#3B82F6" stroke-width="1.5" opacity="0.8"/>
    <!-- Windows -->
    <rect x="30" y="60" width="60" height="45" rx="4" fill="#0A1628" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="110" y="60" width="60" height="45" rx="4" fill="#0A1628" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="190" y="60" width="60" height="45" rx="4" fill="#0A1628" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Door -->
    <rect x="280" y="70" width="50" height="100" rx="4" fill="#0A1628" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="320" cy="120" r="4" fill="#3B82F6"/>
    <!-- Wheels -->
    <circle cx="80" cy="180" r="30" fill="#111827" stroke="#374151" stroke-width="3"/>
    <circle cx="80" cy="180" r="15" fill="#1E3A5F" stroke="#374151" stroke-width="2"/>
    <circle cx="420" cy="180" r="30" fill="#111827" stroke="#374151" stroke-width="3"/>
    <circle cx="420" cy="180" r="15" fill="#1E3A5F" stroke="#374151" stroke-width="2"/>
    <!-- Starlink dish on roof -->
    <rect x="160" y="20" width="80" height="6" rx="3" fill="#FFFFFF" opacity="0.9"/>
    <rect x="195" y="26" width="10" height="14" fill="#9CA3AF"/>
  </g>
  <!-- Signal waves from dish -->
  <g transform="translate(340, 180)">
    <path d="M0 80 Q30 50 60 80" stroke="#3B82F6" stroke-width="2.5" fill="none"/>
    <path d="M-10 65 Q30 25 70 65" stroke="#3B82F6" stroke-width="2.5" fill="none" opacity="0.6"/>
    <path d="M-20 50 Q30 0 80 50" stroke="#3B82F6" stroke-width="2.5" fill="none" opacity="0.3"/>
  </g>
  <!-- Satellite -->
  <g transform="translate(500, 60)">
    <rect x="0" y="10" width="40" height="20" rx="4" fill="#60A5FA" opacity="0.5"/>
    <rect x="-30" y="12" width="30" height="16" rx="2" fill="#3B82F6" opacity="0.3"/>
    <rect x="40" y="12" width="30" height="16" rx="2" fill="#3B82F6" opacity="0.3"/>
    <circle cx="20" cy="20" r="4" fill="#60A5FA"/>
  </g>
  <!-- Trees in background -->
  <g opacity="0.3">
    <path d="M30 420 L50 340 L70 420 Z" fill="#1E3A5F"/>
    <path d="M680 420 L710 330 L740 420 Z" fill="#1E3A5F"/>
    <path d="M720 420 L745 350 L770 420 Z" fill="#1E3A5F"/>
  </g>
  <!-- Speed indicator -->
  <g transform="translate(620, 280)">
    <rect x="0" y="0" width="120" height="60" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="60" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#3B82F6" text-anchor="middle">572</text>
    <text x="60" y="48" font-family="system-ui, sans-serif" font-size="12" fill="#60A5FA" text-anchor="middle" opacity="0.7">Mbps</text>
  </g>
</svg>
