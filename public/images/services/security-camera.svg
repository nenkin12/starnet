<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0A1628"/>
  <rect width="800" height="600" fill="url(#grad3)" opacity="0.6"/>
  <defs>
    <linearGradient id="grad3" x1="0" y1="0" x2="800" y2="600">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <!-- House outline -->
  <g transform="translate(80, 150)">
    <path d="M0 200 L0 100 L120 30 L240 100 L240 200 Z" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
    <rect x="90" y="120" width="60" height="80" fill="#0A1628" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="30" y="110" width="40" height="35" rx="2" fill="#0A1628" stroke="#3B82F6" stroke-width="1"/>
    <rect x="170" y="110" width="40" height="35" rx="2" fill="#0A1628" stroke="#3B82F6" stroke-width="1"/>
  </g>
  <!-- Camera 1 - front of house -->
  <g transform="translate(260, 200)">
    <rect x="0" y="0" width="8" height="20" fill="#9CA3AF"/>
    <rect x="-5" y="20" width="18" height="5" rx="2" fill="#9CA3AF"/>
    <rect x="-10" y="15" width="40" height="22" rx="4" fill="#E5E7EB"/>
    <circle cx="10" cy="26" r="7" fill="#1E3A5F" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="10" cy="26" r="3" fill="#3B82F6"/>
    <!-- Lens glow -->
    <circle cx="10" cy="26" r="12" fill="#3B82F6" opacity="0.15"/>
  </g>
  <!-- Camera 2 - side -->
  <g transform="translate(100, 170)">
    <rect x="0" y="0" width="6" height="15" fill="#9CA3AF"/>
    <rect x="-8" y="12" width="35" height="18" rx="3" fill="#E5E7EB"/>
    <circle cx="8" cy="21" r="6" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="8" cy="21" r="2.5" fill="#3B82F6"/>
    <circle cx="8" cy="21" r="10" fill="#3B82F6" opacity="0.15"/>
  </g>
  <!-- Vision cone from camera 1 -->
  <path d="M275 226 L420 280 L420 380 L275 226" fill="#3B82F6" opacity="0.08"/>
  <line x1="275" y1="226" x2="420" y2="280" stroke="#3B82F6" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
  <line x1="275" y1="226" x2="420" y2="380" stroke="#3B82F6" stroke-width="1" opacity="0.3" stroke-dasharray="6 4"/>
  <!-- Monitor/Phone screen -->
  <g transform="translate(450, 100)">
    <rect x="0" y="0" width="280" height="180" rx="12" fill="#111827" stroke="#3B82F6" stroke-width="2"/>
    <!-- Screen content - grid of camera feeds -->
    <rect x="12" y="12" width="124" height="75" rx="4" fill="#1E3A5F"/>
    <rect x="144" y="12" width="124" height="75" rx="4" fill="#1E3A5F"/>
    <rect x="12" y="95" width="124" height="75" rx="4" fill="#1E3A5F"/>
    <rect x="144" y="95" width="124" height="75" rx="4" fill="#1E3A5F"/>
    <!-- Camera feed indicators -->
    <circle cx="28" cy="27" r="4" fill="#EF4444"/>
    <text x="38" y="31" font-family="system-ui, sans-serif" font-size="9" fill="#9CA3AF">CAM 1</text>
    <circle cx="160" cy="27" r="4" fill="#EF4444"/>
    <text x="170" y="31" font-family="system-ui, sans-serif" font-size="9" fill="#9CA3AF">CAM 2</text>
    <circle cx="28" cy="110" r="4" fill="#EF4444"/>
    <text x="38" y="114" font-family="system-ui, sans-serif" font-size="9" fill="#9CA3AF">CAM 3</text>
    <circle cx="160" cy="110" r="4" fill="#22C55E"/>
    <text x="170" y="114" font-family="system-ui, sans-serif" font-size="9" fill="#9CA3AF">CAM 4</text>
    <!-- Stand -->
    <rect x="125" y="180" width="30" height="8" fill="#374151"/>
    <rect x="100" y="188" width="80" height="5" rx="2" fill="#374151"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(500, 350)">
    <path d="M40 0 L75 15 L75 50 Q75 80 40 95 Q5 80 5 50 L5 15 Z" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
    <path d="M25 48 L35 58 L58 35" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wi-Fi waves connecting camera to monitor -->
  <g transform="translate(360, 160)">
    <path d="M0 40 Q20 25 40 40" stroke="#60A5FA" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M-5 30 Q20 10 45 30" stroke="#60A5FA" stroke-width="1.5" fill="none" opacity="0.3"/>
  </g>
  <!-- Ground line -->
  <line x1="60" y1="450" x2="400" y2="450" stroke="#1E3A5F" stroke-width="2"/>
</svg>
